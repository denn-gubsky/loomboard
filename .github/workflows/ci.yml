name: CI

# Green-gate on every PR and every push to main: typecheck, unit tests, and both
# package builds (the @loomboard/chat library + the @loomboard/app standalone SPA).
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build:lib
      - run: npm run build:standalone
