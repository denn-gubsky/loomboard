name: Publish

# Publishes @loomboard/chat (repo root) and @loomboard/app (cli/) to npm.
#
# Trigger: push a version tag (e.g. `git tag v0.1.0 && git push --tags`), or run
# manually from the Actions tab (workflow_dispatch). Each package is published at
# the version in its own package.json and SKIPPED if that version is already on
# npm — so a shared tag can release both, re-runs are safe, and the two packages
# may diverge in version. `prepack` rebuilds each package's artifacts at publish
# time; the gate below fails fast so we never publish a red build.
#
# Auth: npm Trusted Publishing (OIDC) — no token. Each package has a Trusted
# Publisher configured on npmjs.com (repo denn-gubsky/loomboard, workflow
# publish.yml); the `id-token: write` permission below lets npm exchange the
# GitHub OIDC token for a short-lived publish credential, and provenance
# (Sigstore attestation) rides the same OIDC. Trusted publishing needs npm
# >= 11.5.1 (newer than Node's bundled npm), so we upgrade npm below.
# Prereq: the `@loomboard` org exists on npmjs.com.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # npm provenance (Sigstore)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # registry-url establishes the registry context OIDC trusted publishing
      # authenticates against (npm needs it even token-free).
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      # Trusted publishing (OIDC) needs npm >= 11.5.1 — newer than the npm that
      # ships with Node — so upgrade, then log the versions for diagnosis.
      - run: npm install -g npm@latest
      - run: node -v && npm -v

      # A version tag is only a trigger — the published version comes from each
      # package.json (npm rejects a version already on the registry). Fail loudly
      # if the tag matches neither package's version — the "tagged but forgot to
      # bump package.json" mistake — instead of silently skipping both.
      - name: Check tag matches a package version
        if: github.event_name == 'push'
        env:
          REF: ${{ github.ref_name }}
        run: |
          case "$REF" in
            v[0-9]*.[0-9]*.[0-9]*) tag="${REF#v}" ;;
            *) echo "· $REF is not a vX.Y.Z tag — skipping check"; exit 0 ;;
          esac
          chat=$(node -p "require('./package.json').version")
          app=$(node -p "require('./cli/package.json').version")
          if [ "$tag" != "$chat" ] && [ "$tag" != "$app" ]; then
            echo "::error::Tag $REF ($tag) matches neither @loomboard/chat ($chat) nor @loomboard/app ($app). Bump package.json (npm version) before tagging."
            exit 1
          fi
          echo "· tag $REF matches chat=$chat app=$app"

      - run: npm ci

      # Gate: don't publish anything if the build or tests are red. Build BOTH
      # packages up front so we never publish one and then fail on the other.
      - run: npm run typecheck
      - run: npm test
      - run: npm run build:lib
      - run: npm run build:standalone

      - name: Publish @loomboard/chat
        run: |
          name=$(node -p "require('./package.json').name")
          ver=$(node -p "require('./package.json').version")
          if npm view "$name@$ver" version >/dev/null 2>&1; then
            echo "· $name@$ver already on npm — skipping"
          else
            echo "· publishing $name@$ver"
            npm publish --provenance --access public
          fi
      - name: Publish @loomboard/app
        working-directory: cli
        run: |
          name=$(node -p "require('./package.json').name")
          ver=$(node -p "require('./package.json').version")
          if npm view "$name@$ver" version >/dev/null 2>&1; then
            echo "· $name@$ver already on npm — skipping"
          else
            echo "· publishing $name@$ver"
            npm publish --provenance --access public
          fi