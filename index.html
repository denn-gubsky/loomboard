<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>loomboard</title>
    <script>
      // Apply the persisted (or OS-preferred) theme before first paint so there
      // is no flash of the wrong palette. Mirrors src/state/theme.ts.
      (function () {
        try {
          var t = localStorage.getItem("loomboard.theme");
          if (t !== "light" && t !== "dark") {
            t = matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark";
          }
          document.documentElement.dataset.theme = t;
        } catch (e) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
